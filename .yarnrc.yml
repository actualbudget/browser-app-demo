# Use the classic node_modules layout rather than Plug'n'Play. PnP would break
# the @actual-app/api nightly and its native dependencies (e.g. better-sqlite3),
# and the Vite/tsx toolchain expects a real node_modules tree.
nodeLinker: node-modules

# Yarn quarantines packages newer than `npmMinimalAgeGate` minutes (default 1440
# = 24h) as a supply-chain precaution. We KEEP that protection for the whole
# dependency tree and only exempt the @actual-app scope, which we intentionally
# track on the fast-moving `nightly` tag (freshly published nightlies are
# younger than 24h and would otherwise be blocked).
npmPreapprovedPackages:
  - "@actual-app/*"
